name: curation-tool-env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/nightly/cu130
    - torch
    - pillow
    - pydantic>=2.0
    - click
    - tqdm
    - accelerate
    - transformers>=4.51.3
    - sentencepiece
    - protobuf
    - "diffusers @ git+https://github.com/huggingface/diffusers"
